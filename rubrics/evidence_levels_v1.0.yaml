# GPQS 验证强度等级定义 V1.0

本文档定义 GPQS 的验证强度等级（V0-V5）。

---

## 验证强度等级概述

| 等级 | 名称 | 分数 | 定义 | 示例 |
|------|------|------|------|---------|
| V0 | 无验证 | 0 分 | 未经过任何测试 | 代码写完就上线 |
| V1 | 单元测试 | 4 分 | 有单元测试，但覆盖率低（< 50%） | 只有核心函数有测试 |
| V2 | 集成测试 | 8 分 | 有集成测试，覆盖率中等（50-80%） | API 测试、数据库测试 |
| V3 | 系统测试 | 12 分 | 有系统测试，覆盖主要功能（> 80%） | E2E 测试、UI 测试 |
| V4 | 用户验收测试 | 16 分 | 有真实用户参与测试 | Beta 测试、灰度发布 |
| V5 | 生产环境验证 | 20 分 | 在生产环境验证过，有监控和日志 | A/B 测试、线上监控 |

---

## 详细定义

### V0：无验证

**定义**：项目未经过任何测试，直接上线。

**判断标准**：
- 无测试文件
- 无测试报告
- 无 CI/CD 配置

**风险**：极高。线上问题无法提前发现。

---

### V1：单元测试

**定义**：项目有单元测试，但覆盖率低（< 50%）。

**判断标准**：
- 有测试文件（如 `*.test.js`、`*.spec.py`）
- 测试覆盖率 < 50%
- 只测试了核心函数

**示例**：
- 只有登录函数有单元测试
- 只有数据库 CRUD 有单元测试

**风险**：中。核心功能有测试，但边界情况未覆盖。

---

### V2：集成测试

**定义**：项目有集成测试，覆盖率中等（50-80%）。

**判断标准**：
- 有 API 测试
- 有数据库集成测试
- 测试覆盖率 50-80%

**示例**：
- 所有 API 接口都有测试
- 数据库读写都有测试

**风险**：中低。主要功能有测试，但端到端流程未覆盖。

---

### V3：系统测试

**定义**：项目有系统测试，覆盖主要功能（> 80%）。

**判断标准**：
- 有 E2E 测试（端到端测试）
- 有 UI 测试
- 测试覆盖率 > 80%

**示例**：
- 用户注册 → 登录 → 使用功能 → 退出登录，完整流程有测试
- 所有 UI 组件都有测试

**风险**：低。主要功能都有测试，边界情况基本覆盖。

---

### V4：用户验收测试

**定义**：项目有真实用户参与测试。

**判断标准**：
- 有 Beta 测试阶段
- 有灰度发布（小部分用户试用）
- 有用户反馈收集

**示例**：
- 发布 Beta 版给 100 个用户试用
- 灰度发布给 5% 的用户

**风险**：低。真实用户使用过程中发现问题。

---

### V5：生产环境验证

**定义**：项目在生产环境验证过，有监控和日志。

**判断标准**：
- 有 A/B 测试（对比新旧版本）
- 有线上监控（如 Sentry、New Relic）
- 有日志分析（如 ELK、Splunk）

**示例**：
- 同时运行两个版本，收集用户反馈和数据
- 实时监控线上错误，自动告警

**风险**：极低。生产环境有完整监控，问题能快速发现。

---

## 如何提升验证强度等级？

| 当前等级 | 提升方式 |
|----------|----------|
| V0 | 添加单元测试（覆盖核心函数） |
| V1 | 添加集成测试（覆盖 API 和数据库） |
| V2 | 添加系统测试（覆盖端到端流程） |
| V3 | 邀请真实用户参与 Beta 测试 |
| V4 | 配置生产环境监控和日志 |
| V5 | 保持监控，持续优化 |

