# GPQS 核心评分细则 V1.0

本文档定义 GPQS 的 7 个评分维度的详细评分规则。

---

## 维度 1：领域知识完整性（20 分）

### 1.1 知识条目数量（10 分）

| 分数 | 条目数量 | 说明 |
|--------|----------|------|
| 10 分 | 10+ 条 | 知识沉淀充分 |
| 7-9 分 | 5-9 条 | 知识沉淀基本充分 |
| 4-6 分 | 2-4 条 | 知识沉淀不足 |
| 0-3 分 | 0-1 条 | 无知识沉淀 |

### 1.2 知识质量（10 分）

| 分数 | 质量标准 | 说明 |
|--------|----------|------|
| 10 分 | 每条知识都有明确来源、实操性评估、行动指引 | 高质量 |
| 7-9 分 | 大部分知识有来源和实操性评估 | 中高质量 |
| 4-6 分 | 部分知识有来源，但缺乏实操性评估 | 中等质量 |
| 0-3 分 | 知识无明确来源，或缺乏实操性 | 低质量 |

**验证方式**：
- 读取 `domain_knowledge.yaml`
- 检查 `knowledge_items` 数组长度
- 检查每条知识的 `source`、`practicality`、`action` 字段

---

## 维度 2：功能完整性与可靠性（25 分）

### 2.1 功能完整性（15 分）

| 分数 | 完成率 | 说明 |
|--------|--------|------|
| 15 分 | 90%+ | 功能基本完整 |
| 11-14 分 | 70-89% | 主要功能完整 |
| 6-10 分 | 50-69% | 部分功能完整 |
| 0-5 分 | < 50% | 功能不完整 |

### 2.2 可靠性（10 分）

| 分数 | 可靠性指标 | 说明 |
|--------|--------------|------|
| 10 分 | 99%+ | 高可靠性 |
| 7-9 分 | 95-98% | 中等可靠性 |
| 4-6 分 | 90-94% | 基本可靠性 |
| 0-3 分 | < 90% | 低可靠性 |

**验证方式**：
- 读取 `functionality_checklist.yaml`
- 检查 `modules` 数组的 `status` 字段（`complete` / `partial` / `not_started`）
- 检查 `reliability` 字段（99 / 95 / 90 / < 90）

---

## 维度 3：测试覆盖率与验证强度（20 分）

### 3.1 验证强度等级（20 分）

| 等级 | 分数 | 定义 |
|-------|------|------|
| V5 | 20 分 | 生产环境验证（A/B 测试、线上监控） |
| V4 | 16 分 | 用户验收测试（Beta 测试、灰度发布） |
| V3 | 12 分 | 系统测试（覆盖率 > 80%） |
| V2 | 8 分 | 集成测试（覆盖率 50-80%） |
| V1 | 4 分 | 单元测试（覆盖率 < 50%） |
| V0 | 0 分 | 无验证 |

**验证方式**：
- 读取 `test_coverage.yaml`
- 检查 `validation_level` 字段（V0 / V1 / V2 / V3 / V4 / V5）
- 检查 `coverage_rate` 字段（覆盖率百分比）

---

## 维度 4：可维护性与迭代能力（15 分）

### 4.1 代码质量（5 分）

| 分数 | 代码复杂度 | 说明 |
|--------|--------------|------|
| 5 分 | 低（Cyclomatic Complexity < 5） | 代码易读 |
| 3-4 分 | 中（Cyclomatic Complexity 5-10） | 代码基本易读 |
| 1-2 分 | 高（Cyclomatic Complexity > 10） | 代码难读 |
| 0 分 | 极高（Cyclomatic Complexity > 20） | 代码极难读 |

### 4.2 文档完整性（5 分）

| 分数 | 文档完整度 | 说明 |
|--------|--------------|------|
| 5 分 | 完整（README + API 文档 + 架构文档） | 文档齐全 |
| 3-4 分 | 基本完整（README + API 文档） | 文档基本齐全 |
| 1-2 分 | 部分完整（只有 README） | 文档不完整 |
| 0 分 | 无文档 | 无文档 |

### 4.3 技术债务管理（5 分）

| 分数 | 技术债务 | 说明 |
|--------|------------|------|
| 5 分 | 无技术债务，有迭代计划 | 健康 |
| 3-4 分 | 少量技术债务，可控 | 基本健康 |
| 1-2 分 | 中等技术债务，需计划 | 需改进 |
| 0 分 | 严重技术债务，无计划 | 不健康 |

**验证方式**：
- 读取 `maintainability.yaml`
- 检查 `code_complexity` 字段
- 检查 `documentation_completeness` 字段
- 检查 `technical_debt` 字段

---

## 维度 5：用户适配与个性化（5 分，可选）

### 5.1 适配能力（5 分）

| 分数 | 适配能力 | 说明 |
|--------|----------|------|
| 5 分 | 支持自动个性化（根据用户、任务、环境自动调整） | 强 |
| 3-4 分 | 支持手动个性化（需要用户配置） | 中 |
| 1-2 分 | 支持基本个性化（功能有限） | 弱 |
| 0 分 | 不支持个性化 | 无 |

**验证方式**：
- 读取 `user_adaptation.yaml`（如果有）
- 检查 `auto_personalization` 字段
- 检查 `manual_personalization` 字段

---

## 维度 6：业务价值与专家经验沉淀（5 分，可选）

### 6.1 专家经验沉淀（5 分）

| 分数 | 专家经验沉淀 | 说明 |
|--------|----------------|------|
| 5 分 | 沉淀了完整的专家经验，能放大专家能力 | 强 |
| 3-4 分 | 部分沉淀了专家经验，能部分放大专家能力 | 中 |
| 1-2 分 | 少量沉淀了专家经验，放大专家能力有限 | 弱 |
| 0 分 | 未沉淀专家经验 | 无 |

**验证方式**：
- 读取 `domain_knowledge.yaml`
- 检查 `expert_experience` 字段
- 检查 `amplify_expert` 字段

---

## 维度 7：安全性与合规性（10 分）

### 7.1 安全清单完成度（10 分）

| 分数 | 完成度 | 说明 |
|--------|--------|------|
| 10 分 | 100% 完成（10+ 项，所有项都通过） | 安全 |
| 7-9 分 | 80-99% 完成（5-9 项，大部分通过） | 基本安全 |
| 4-6 分 | 50-79% 完成（< 5 项，部分通过） | 部分安全 |
| 0-3 分 | < 50% 完成（无清单，或关键项未通过） | 不安全 |

**验证方式**：
- 读取 `security_checklist.yaml`
- 检查 `items` 数组长度
- 检查每项的 `status` 字段（`passed` / `failed` / `not_checked`）

---

## 惩罚机制

| 情况 | 惩罚 | 说明 |
|------|------|------|
| 无安全清单 | -10 分 | 维度 ⑦ 直接 0 分 |
| 验证强度等级虚报 | -5 分 | 如实声明验证强度 |
| 无领域知识来源 | -5 分 | 每条知识都应有明确来源 |
| 技术债务严重 | -3 分 | 维度 ④ 扣分 |

