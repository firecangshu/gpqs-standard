# 测试覆盖率报告示例 / Test Coverage Example

```yaml
# 测试覆盖率报告 / Test Coverage Report
validation_level: "V3"  # 系统测试

# 单元测试 / Unit Tests
unit_tests:
  enabled: true
  coverage_rate: 75  # 75% 覆盖率
  total_cases: 50
  passed_cases: 48
  failed_cases: 2

# 集成测试 / Integration Tests
integration_tests:
  enabled: true
  coverage_rate: 80
  total_apis: 20
  tested_apis: 18

# 系统测试 / System Tests
system_tests:
  enabled: true
  coverage_rate: 85
  e2e_cases: 30
  passed_e2e: 28

# 用户验收测试 / User Acceptance Testing
uat:
  enabled: false
  beta_users: 0
  feedback_collected: 0

# 生产环境验证 / Production Validation
production_validation:
  enabled: false
  monitoring_tools: []
  has_logs: false
```

